<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>E-Finanças | Cadastro</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page login-page register-page">
      <section class="register-shell" aria-label="Cadastro no E-Finanças">
        <a class="brand brand--center" href="index.html" aria-label="E-Finanças">
          <span class="brand__mark" aria-hidden="true">EF</span>
          <span>
            <span class="brand__name">E-Finanças</span>
            <span class="brand__caption">Controle financeiro pessoal</span>
          </span>
        </a>

        <header class="auth-header auth-header--compact">
          <p class="eyebrow">Novo cadastro</p>
          <h1>Crie sua conta</h1>
          <p>Organize receitas, despesas e metas em poucos minutos.</p>
        </header>

        <form id="auth-form" class="form">
          <div class="field">
            <label for="nome">Nome completo</label>
            <input id="nome" name="nome" type="text" placeholder="Maria Clara" autocomplete="name" required>
          </div>

          <div class="field">
            <label for="email">E-mail</label>
            <input id="email" name="email" type="email" placeholder="usuario@email.com" autocomplete="email" required>
          </div>

          <div class="form-grid">
            <div class="field">
              <label for="senha">Senha</label>
              <input id="senha" name="senha" type="password" placeholder="********" autocomplete="new-password" required>
            </div>

            <div class="field">
              <label for="confirmar-senha">Confirmar senha</label>
              <input id="confirmar-senha" name="confirmar-senha" type="password" placeholder="********" autocomplete="new-password" required>
            </div>
          </div>

          <button class="btn btn--primary btn--full" type="submit">Criar conta</button>
          <p id="auth-status" class="auth-status" role="status"></p>
        </form>

        <p class="auth-footer">Já tem conta? <a class="text-link" href="index.html">Entrar</a></p>
      </section>
    </main>


    <script type="module" src="js/pages/cadastro.js"></script>
  </body>
</html>
